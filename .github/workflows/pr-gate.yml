name: PR gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TEST_AUDIT_SEAL_KEY: ${{ secrets.TEST_AUDIT_SEAL_KEY || 'ci-throwaway-only' }}
      TEST_INTENT_ENVELOPE_BOOTSTRAP_KEY: ${{ secrets.TEST_INTENT_ENVELOPE_BOOTSTRAP_KEY || 'ci-owner-bootstrap-throwaway-only' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: open-policy-agent/setup-opa@v2.3.0
        with:
          version: 1.17.0
      - run: npm ci
      - run: npm run compile:policy
      - run: npm run test:conformance
      - run: npm run test:interception
      - run: npm run test:receipts
      - run: npm run test:intent-envelope
      - run: npm audit --omit=dev --audit-level=high
