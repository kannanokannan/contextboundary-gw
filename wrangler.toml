name = "contextboundary-gw"
main = "src/worker.js"
compatibility_date = "2026-07-08"
workers_dev = true

[vars]
UPSTREAM_MCP_URL = "https://mcp.context-stack.org/mcp"

[[analytics_engine_datasets]]
binding = "AUDIT"
dataset = "contextboundary_gw_audit"

[[durable_objects.bindings]]
name = "INTENT_SESSIONS"
class_name = "IntentSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IntentSession"]

[env.staging]
name = "contextboundary-gw-staging"
workers_dev = true

[env.staging.vars]
UPSTREAM_MCP_URL = "https://mcp.context-stack.org/mcp"

[[env.staging.durable_objects.bindings]]
name = "INTENT_SESSIONS"
class_name = "IntentSession"

[[env.staging.analytics_engine_datasets]]
binding = "AUDIT"
dataset = "contextboundary_gw_audit_staging"
